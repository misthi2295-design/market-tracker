<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Market Tracker</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#050816;
  color:white;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

h1{
  font-size:42px;
}

h2{
  margin-top:40px;
  margin-bottom:20px;
}

.refresh-btn{
  background:#6c63ff;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
}

.card{
  background:#11182d;
  padding:22px;
  border-radius:18px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-5px);
}

.symbol{
  color:#a0a0a0;
  margin-bottom:14px;
  font-size:15px;
}

.price{
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
}

.change{
  font-size:18px;
  font-weight:bold;
}

.green{
  color:#00ff9d;
}

.red{
  color:#ff4d6d;
}

.footer{
  text-align:center;
  margin-top:40px;
  color:#888;
  font-size:14px;
}

.loader{
  text-align:center;
  font-size:20px;
  color:#aaa;
  margin-top:80px;
}

</style>

</head>

<body>

<div class="topbar">

  <h1>📈 Live Market Tracker</h1>

  <button class="refresh-btn" onclick="startLoad()">
    Refresh
  </button>

</div>

<!-- MAIN MARKET -->

<h2>🌍 Global Markets</h2>

<div class="grid" id="marketGrid">

  <div class="loader">
    Loading Live Market Data...
  </div>

</div>

<!-- GAINERS -->

<h2>🚀 Top Gainers</h2>

<div class="grid" id="gainersGrid"></div>

<!-- LOSERS -->

<h2>📉 Top Losers</h2>

<div class="grid" id="losersGrid"></div>

<div class="footer">
  Auto Refresh Every 60 Seconds
</div>

<script>

const symbols = [

  {
    name:"S&P 500",
    symbol:"^GSPC"
  },

  {
    name:"NASDAQ",
    symbol:"^IXIC"
  },

  {
    name:"Dow Jones",
    symbol:"^DJI"
  },

  {
    name:"NIFTY 50",
    symbol:"^NSEI"
  },

  {
    name:"BANK NIFTY",
    symbol:"^NSEBANK"
  },

  {
    name:"BTC/USD",
    symbol:"BTC-USD"
  },

  {
    name:"ETH/USD",
    symbol:"ETH-USD"
  }

];

const gainers = [

  {
    name:"NVIDIA",
    symbol:"NVDA"
  },

  {
    name:"Tesla",
    symbol:"TSLA"
  },

  {
    name:"Meta",
    symbol:"META"
  },

  {
    name:"Netflix",
    symbol:"NFLX"
  }

];

const losers = [

  {
    name:"Intel",
    symbol:"INTC"
  },

  {
    name:"PayPal",
    symbol:"PYPL"
  },

  {
    name:"Apple",
    symbol:"AAPL"
  },

  {
    name:"Alibaba",
    symbol:"BABA"
  }

];

async function fetchYahoo(symbol){

  try{

    const proxy =
    "https://api.allorigins.win/get?url=";

    const target =
    encodeURIComponent(
      `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`
    );

    const response = await fetch(proxy + target);

    const wrappedData = await response.json();

    const data = JSON.parse(wrappedData.contents);

    const result = data.chart.result[0];

    const meta = result.meta;

    const price = meta.regularMarketPrice;

    const prevClose = meta.previousClose;

    const change = (price - prevClose).toFixed(2);

    const percent =
    (((price - prevClose) / prevClose) * 100).toFixed(2);

    return {

      price: price.toFixed(2),
      change,
      percent

    };

  }

  catch(error){

    console.log("ERROR:", error);

    return null;

  }

}

async function loadMainMarket(){

  const grid =
  document.getElementById("marketGrid");

  let html = "";

  for(const item of symbols){

    const data =
    await fetchYahoo(item.symbol);

    if(data){

      const positive =
      Number(data.change) >= 0;

      html += `

      <div class="card">

        <div class="symbol">
          ${item.name}
        </div>

        <div class="price">
          ${data.price}
        </div>

        <div class="change ${positive ? "green" : "red"}">

          ${positive ? "▲" : "▼"}

          ${data.change}

          (${data.percent}%)

        </div>

      </div>

      `;

    }

  }

  grid.innerHTML = html;

}

async function loadGainers(){

  const grid =
  document.getElementById("gainersGrid");

  let html = "";

  for(const item of gainers){

    const data =
    await fetchYahoo(item.symbol);

    if(data){

      html += `

      <div class="card">

        <div class="symbol">
          ${item.name}
        </div>

        <div class="price">
          ${data.price}
        </div>

        <div class="change green">

          ▲ ${data.change}

          (${data.percent}%)

        </div>

      </div>

      `;

    }

  }

  grid.innerHTML = html;

}

async function loadLosers(){

  const grid =
  document.getElementById("losersGrid");

  let html = "";

  for(const item of losers){

    const data =
    await fetchYahoo(item.symbol);

    if(data){

      html += `

      <div class="card">

        <div class="symbol">
          ${item.name}
        </div>

        <div class="price">
          ${data.price}
        </div>

        <div class="change red">

          ▼ ${data.change}

          (${data.percent}%)

        </div>

      </div>

      `;

    }

  }

  grid.innerHTML = html;

}

async function startLoad(){

  await loadMainMarket();

  await loadGainers();

  await loadLosers();

}

startLoad();

setInterval(startLoad,60000);

</script>

</body>

</html>
