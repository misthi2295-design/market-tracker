<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Market Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050816;
      color:white;
      padding:20px;
    }

    h1{
      margin-bottom:20px;
      color:#fff;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .refresh-btn{
      padding:10px 18px;
      background:#6c63ff;
      border:none;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#10172b;
      padding:20px;
      border-radius:16px;
      box-shadow:0 0 10px rgba(0,0,0,0.4);
    }

    .symbol{
      font-size:14px;
      color:#aaa;
      margin-bottom:10px;
    }

    .price{
      font-size:28px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .change{
      font-size:16px;
      font-weight:bold;
    }

    .green{
      color:#00ff9d;
    }

    .red{
      color:#ff4d6d;
    }

    .footer{
      margin-top:30px;
      text-align:center;
      color:#888;
      font-size:13px;
    }

    .loader{
      text-align:center;
      margin-top:50px;
      color:#999;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <h1>📈 Live Market Tracker</h1>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>

  <div class="grid" id="marketGrid"></div>

  <div class="footer">
    Auto Refresh Every 60 Seconds
  </div>

<script>

const symbols = [
  {
    name: "S&P 500",
    symbol: "^GSPC"
  },
  {
    name: "NASDAQ",
    symbol: "^IXIC"
  },
  {
    name: "Dow Jones",
    symbol: "^DJI"
  },
  {
    name: "NIFTY 50",
    symbol: "^NSEI"
  },
  {
    name: "BANK NIFTY",
    symbol: "^NSEBANK"
  },
  {
    name: "BTC/USD",
    symbol: "BTC-USD"
  },
  {
    name: "ETH/USD",
    symbol: "ETH-USD"
  }
];

async function fetchYahoo(symbol){

  try{

    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;

    const res = await fetch(url);

    const data = await res.json();

    const result = data.chart.result[0];

    const meta = result.meta;

    const price = meta.regularMarketPrice;
    const prev = meta.previousClose;

    const change = (price - prev).toFixed(2);
    const percent = ((change / prev) * 100).toFixed(2);

    return {
      price,
      change,
      percent
    };

  }catch(err){

    return null;

  }

}

async function loadData(){

  const grid = document.getElementById("marketGrid");

  grid.innerHTML = `<div class="loader">Loading Live Market Data...</div>`;

  let html = "";

  for(const item of symbols){

    const data = await fetchYahoo(item.symbol);

    if(data){

      const positive = data.change >= 0;

      html += `
        <div class="card">
          <div class="symbol">${item.name}</div>

          <div class="price">
            ${data.price}
          </div>

          <div class="change ${positive ? 'green' : 'red'}">
            ${positive ? '▲' : '▼'}
            ${data.change}
            (${data.percent}%)
          </div>
        </div>
      `;

    }else{

      html += `
        <div class="card">
          <div class="symbol">${item.name}</div>

          <div class="price">--</div>

          <div class="change red">
            Data Failed
          </div>
        </div>
      `;

    }

  }

  grid.innerHTML = html;

}

loadData();

setInterval(loadData, 60000);

</script>

</body>
</html>
